site_name: Technical Writing Portfolio - RK Manga
site_description: Personal portfolio of RK Manga, showcasing technical writing projects and expertise.
site_url: https://sitename.example

theme:
  name: material
  logo: assets/logo.png
  #favicon: assets/favicon.ico
  #custom_dir: overrides
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.tabs
    - navigation.sections
    - navigation.footer
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow  
  
  font:
    text: Roboto
    code: Roboto Mono

  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: cyan
      accent: deep orange

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: "pymdownx.superfences.fence_code_format"
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # - pymdownx.emoji:
  #     emoji_index: python/name:material.extensions.emoji.twemoji
  #     emoji_generator: python/name:material.extensions.emoji.to_svg
#extra:
  #social:
   # - icon: simple/linkedin
   #   link: https://linkedin.com/in/rkmanga
copyright: Copyright &copy; 2026 RK Manga | All rights reserved.
nav:
  - index.md